services:
  web:
    build: .
    command: >
      python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/code
      - static_volume:/code/static

    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    env_file:
      - .env

  db:
    image: postgres:17
    env_file:
      - .env
    volumes:
      - pg_data:/var/lib/postgresql/data
    expose:
      - "5432"

  redis:
    image: redis:latest
    expose:
      - "6379"

  celery:
    build: .
    command:
      bash -c "celery -A config worker --loglevel=info"
    depends_on:
      - redis
      - db
    env_file:
      - .env

  celery-beat:
    build: .
    command:
      bash -c "celery -A config beat --loglevel=info"
    depends_on:
      - redis
      - db
    env_file:
      - .env

volumes:
  pg_data:
  static_volume: